<svg viewBox="0 0 600 380" xmlns="http://www.w3.org/2000/svg" font-family="'Helvetica Neue', Arial, 'Hiragino Sans', 'Meiryo', sans-serif">
  <title>カテゴリ別 売上構成比</title>
  <desc>大型トラック用埋設リフト（TWPF系）50.0%、乗用車用パンタ式ASC系38.4%、BUD系6.0%、WTSL系5.0%、BWR0.7%</desc>

  <rect width="600" height="380" fill="#ffffff"/>
  <text x="300" y="30" text-anchor="middle" font-size="15" font-weight="bold" fill="#222">① カテゴリ別 売上構成比</text>
  <text x="300" y="50" text-anchor="middle" font-size="11" fill="#888">NRJ20除外 / 合計 426,327.5万円</text>

  <!-- ドーナツ: cx=200, cy=210, R=130, r=65 -->
  <!-- 各セグメントの角度（合計360°）
       TWPF系  50.0% = 180.0°  start=  0° end=180°
       ASC系   38.4% = 138.24° start=180° end=318.24°
       BUD系    6.0% =  21.6°  start=318.24° end=339.84°
       WTSL系   5.0% =  18.0°  start=339.84° end=357.84°
       BWR      0.7% =   2.52° start=357.84° end=360.36°≈360°
  -->

  <!-- helper: arc path from angle a1 to a2 (degrees), cx cy R r -->
  <!-- TWPF系 50.0% 紫 #534AB7 : 0→180° -->
  <path d="M200,80 A130,130 0 1,1 70,210 L118,210 A65,65 0 1,0 265,210 Z" fill="#534AB7"/>
  <!-- ASC系 38.4% 緑 #1D9E75 : 180→318.24° -->
  <!-- 318.24-180=138.24°>180なのでlarge-arc=0 -->
  <!-- start=180°: x=200+130*cos(180°)=70, y=210+130*sin(180°)=210 -->
  <!-- end=318.24°: cos=-0.746,sin=-0.666 → x=200+130*(-0.746)=103.0, y=210+130*(-0.666)=123.4 -->
  <path d="M70,210 A130,130 0 0,1 103,124 L151,167 A65,65 0 0,0 135,210 Z" fill="#1D9E75"/>
  <!-- BUD系 6.0% オレンジ #D85A30 : 318.24→339.84° -->
  <!-- start: cos(318.24°)=0.746,sin=-0.666 → x=200+130*0.746=296.9,y=210+130*(-0.666)=123.4 → mirrored from above: x=297,y=124 -->
  <!-- end: cos(339.84°)=0.939,sin=-0.344 → x=200+130*0.939=322.0,y=210+130*(-0.344)=165.3 -->
  <path d="M103,124 A130,130 0 0,1 322,165 L194,175 A65,65 0 0,0 151,167 Z" fill="#D85A30"/>
  <!-- WTSL系 5.0% 青 #378ADD : 339.84→357.84° -->
  <!-- end: cos(357.84°)=0.9993,sin=-0.035 → x=200+130*0.9993=329.9,y=210+130*(-0.035)=205.4 -->
  <path d="M322,165 A130,130 0 0,1 330,205 L197,208 A65,65 0 0,0 194,175 Z" fill="#378ADD"/>
  <!-- BWR 0.7% グレー #888780 : 357.84→360° -->
  <path d="M330,205 A130,130 0 0,1 330,210 L197,210 A65,65 0 0,0 197,208 Z" fill="#888780"/>

  <!-- 中央ドーナツ穴 -->
  <circle cx="200" cy="210" r="65" fill="#ffffff"/>
  <text x="200" y="205" text-anchor="middle" font-size="12" fill="#555">売上合計</text>
  <text x="200" y="222" text-anchor="middle" font-size="11" font-weight="bold" fill="#222">426,327万円</text>

  <!-- 凡例 -->
  <rect x="355" y="80"  width="12" height="12" rx="2" fill="#534AB7"/>
  <text x="373" y="91"  font-size="11" fill="#333">大型トラック用 埋設リフト（TWPF系）</text>
  <text x="373" y="105" font-size="12" font-weight="bold" fill="#534AB7">50.0%  213,260万円</text>

  <rect x="355" y="120" width="12" height="12" rx="2" fill="#1D9E75"/>
  <text x="373" y="131" font-size="11" fill="#333">乗用車用 パンタ式二柱（ASC系）</text>
  <text x="373" y="145" font-size="12" font-weight="bold" fill="#1D9E75">38.4%  163,598万円</text>

  <rect x="355" y="160" width="12" height="12" rx="2" fill="#D85A30"/>
  <text x="373" y="171" font-size="11" fill="#333">乗用車用 パンタ式ドライブオン 6t（BUD系）</text>
  <text x="373" y="185" font-size="12" font-weight="bold" fill="#D85A30">6.0%  25,469万円</text>

  <rect x="355" y="200" width="12" height="12" rx="2" fill="#378ADD"/>
  <text x="373" y="211" font-size="11" fill="#333">大型トラック用 埋設リフト（WTSL系）</text>
  <text x="373" y="225" font-size="12" font-weight="bold" fill="#378ADD">5.0%  21,193万円</text>

  <rect x="355" y="240" width="12" height="12" rx="2" fill="#888780"/>
  <text x="373" y="251" font-size="11" fill="#333">小型リフト用 無線リモコン（BWR）</text>
  <text x="373" y="265" font-size="12" font-weight="bold" fill="#888780">0.7%  2,807万円</text>
</svg>
