<svg viewBox="0 0 620 520" xmlns="http://www.w3.org/2000/svg" font-family="'Helvetica Neue', Arial, 'Hiragino Sans', 'Meiryo', sans-serif">
  <title>型式別 売上金額ランキング</title>
  <desc>ASC32Uが158,258万円で最大、次いでTWPF30Nが127,327万円</desc>

  <rect width="620" height="520" fill="#ffffff"/>
  <text x="310" y="28" text-anchor="middle" font-size="15" font-weight="bold" fill="#222">② 型式別 売上金額ランキング</text>
  <text x="310" y="46" text-anchor="middle" font-size="11" fill="#888">単位：万円</text>

  <!-- 凡例 -->
  <rect x="30" y="58" width="10" height="10" rx="2" fill="#1D9E75"/>
  <text x="44" y="68" font-size="10" fill="#555">乗用車用（ASC系）</text>
  <rect x="150" y="58" width="10" height="10" rx="2" fill="#534AB7"/>
  <text x="164" y="68" font-size="10" fill="#555">大型トラック用（TWPF/WTSL系）</text>
  <rect x="340" y="58" width="10" height="10" rx="2" fill="#D85A30"/>
  <text x="354" y="68" font-size="10" fill="#555">乗用車用（BUD系）</text>
  <rect x="460" y="58" width="10" height="10" rx="2" fill="#888780"/>
  <text x="474" y="68" font-size="10" fill="#555">その他</text>

  <!-- 軸ラベルと目盛り: 左端=140, 右端=600, max=160000 -->
  <!-- x目盛り: 0,40000,80000,120000,160000 -->
  <line x1="140" y1="80" x2="140" y2="480" stroke="#ccc" stroke-width="1"/>
  <line x1="140" y1="480" x2="600" y2="480" stroke="#ccc" stroke-width="1"/>

  <!-- 目盛り線と軸ラベル -->
  <line x1="255" y1="80" x2="255" y2="480" stroke="#eee" stroke-width="1" stroke-dasharray="3,3"/>
  <line x1="370" y1="80" x2="370" y2="480" stroke="#eee" stroke-width="1" stroke-dasharray="3,3"/>
  <line x1="485" y1="80" x2="485" y2="480" stroke="#eee" stroke-width="1" stroke-dasharray="3,3"/>
  <line x1="600" y1="80" x2="600" y2="480" stroke="#eee" stroke-width="1" stroke-dasharray="3,3"/>
  <text x="140" y="495" text-anchor="middle" font-size="9" fill="#999">0</text>
  <text x="255" y="495" text-anchor="middle" font-size="9" fill="#999">4万</text>
  <text x="370" y="495" text-anchor="middle" font-size="9" fill="#999">8万</text>
  <text x="485" y="495" text-anchor="middle" font-size="9" fill="#999">12万</text>
  <text x="600" y="495" text-anchor="middle" font-size="9" fill="#999">16万</text>

  <!-- bars: sorted by value desc -->
  <!-- scale: 460px = 160000万円 → 1万円 = 0.002875px -->
  <!-- row height=25px, start y=85 -->

  <!-- 1: ASC32U 158258.4 → 455px  #1D9E75 -->
  <rect x="140" y="85"  width="455" height="20" rx="2" fill="#1D9E75"/>
  <text x="135" y="99"  text-anchor="end" font-size="10" fill="#333">ASC32U</text>
  <text x="599" y="99"  text-anchor="end" font-size="9"  fill="#fff">158,258万</text>

  <!-- 2: TWPF30N 127327.2 → 366px  #534AB7 -->
  <rect x="140" y="110" width="366" height="20" rx="2" fill="#534AB7"/>
  <text x="135" y="124" text-anchor="end" font-size="10" fill="#333">TWPF30N</text>
  <text x="510" y="124" text-anchor="end" font-size="9"  fill="#fff">127,327万</text>

  <!-- 3: TWPF602N 28080.5 → 81px -->
  <rect x="140" y="135" width="81" height="20" rx="2" fill="#534AB7"/>
  <text x="135" y="149" text-anchor="end" font-size="10" fill="#333">TWPF602N</text>
  <text x="228" y="149" font-size="9" fill="#534AB7"> 28,081万</text>

  <!-- 4: TWPF30ND 27183.3 → 78px -->
  <rect x="140" y="160" width="78" height="20" rx="2" fill="#534AB7"/>
  <text x="135" y="174" text-anchor="end" font-size="10" fill="#333">TWPF30ND</text>
  <text x="225" y="174" font-size="9" fill="#534AB7"> 27,183万</text>

  <!-- 5: BUD60ULJ 16923.6 → 49px #D85A30 -->
  <rect x="140" y="185" width="49" height="20" rx="2" fill="#D85A30"/>
  <text x="135" y="199" text-anchor="end" font-size="10" fill="#333">BUD60ULJ</text>
  <text x="196" y="199" font-size="9" fill="#D85A30"> 16,924万</text>

  <!-- 6: WTSL15 21192.6 → 61px #378ADD -->
  <rect x="140" y="210" width="61" height="20" rx="2" fill="#378ADD"/>
  <text x="135" y="224" text-anchor="end" font-size="10" fill="#333">WTSL15</text>
  <text x="208" y="224" font-size="9" fill="#378ADD"> 21,193万</text>

  <!-- 7: ASC32 5340 → 15px #1D9E75 -->
  <rect x="140" y="235" width="15" height="20" rx="2" fill="#1D9E75"/>
  <text x="135" y="249" text-anchor="end" font-size="10" fill="#333">ASC32</text>
  <text x="162" y="249" font-size="9" fill="#1D9E75"> 5,340万</text>

  <!-- 8: TWPF45ND 7848.5 → 23px -->
  <rect x="140" y="260" width="23" height="20" rx="2" fill="#534AB7"/>
  <text x="135" y="274" text-anchor="end" font-size="10" fill="#333">TWPF45ND</text>
  <text x="170" y="274" font-size="9" fill="#534AB7"> 7,849万</text>

  <!-- 9: BUD60UJ 8545.5 → 25px -->
  <rect x="140" y="285" width="25" height="20" rx="2" fill="#D85A30"/>
  <text x="135" y="299" text-anchor="end" font-size="10" fill="#333">BUD60UJ</text>
  <text x="172" y="299" font-size="9" fill="#D85A30"> 8,546万</text>

  <!-- 10: TWPF45N 6800.2 → 20px -->
  <rect x="140" y="310" width="20" height="20" rx="2" fill="#534AB7"/>
  <text x="135" y="324" text-anchor="end" font-size="10" fill="#333">TWPF45N</text>
  <text x="167" y="324" font-size="9" fill="#534AB7"> 6,800万</text>

  <!-- 11: TWPF601N 6418.4 → 18px -->
  <rect x="140" y="335" width="18" height="20" rx="2" fill="#534AB7"/>
  <text x="135" y="349" text-anchor="end" font-size="10" fill="#333">TWPF601N</text>
  <text x="165" y="349" font-size="9" fill="#534AB7"> 6,418万</text>

  <!-- 12: TWPF602ND 7435.2 → 21px -->
  <rect x="140" y="360" width="21" height="20" rx="2" fill="#534AB7"/>
  <text x="135" y="374" text-anchor="end" font-size="10" fill="#333">TWPF602ND</text>
  <text x="168" y="374" font-size="9" fill="#534AB7"> 7,435万</text>

  <!-- 13: BWR 2807.2 → 8px #888780 -->
  <rect x="140" y="385" width="8" height="20" rx="2" fill="#888780"/>
  <text x="135" y="399" text-anchor="end" font-size="10" fill="#333">BWR</text>
  <text x="155" y="399" font-size="9" fill="#888780"> 2,807万</text>

  <!-- 14: TWPF30NDR 1237.5 → 4px -->
  <rect x="140" y="410" width="4" height="20" rx="2" fill="#534AB7"/>
  <text x="135" y="424" text-anchor="end" font-size="10" fill="#333">TWPF30NDR</text>
  <text x="151" y="424" font-size="9" fill="#534AB7"> 1,238万</text>

  <!-- 15: TWPF601ND 929.4 → 3px -->
  <rect x="140" y="435" width="3" height="20" rx="2" fill="#534AB7"/>
  <text x="135" y="449" text-anchor="end" font-size="10" fill="#333">TWPF601ND</text>
  <text x="150" y="449" font-size="9" fill="#534AB7"> 929万</text>
</svg>
